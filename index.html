<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>売上管理システム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🏢 売上管理システム</h1>

    <section class="card">
        <h2>📝 申し込み入力</h2>

        <div class="form-group">
            <label>担当者</label>
            <select id="staff">
                <option>矢部</option>
                <option>早坂</option>
                <option>米山</option>
                <option>吉田</option>
            </select>
        </div>

        <div class="form-group">
            <label>お申し込み日</label>
            <input type="date" id="applicationDate">
        </div>

        <div class="form-group">
            <label>物件名</label>
            <input type="text" id="property">
        </div>

        <div class="form-group">
            <label>顧客名</label>
            <input type="text" id="customer">
        </div>

        <div class="form-group">
            <label>管理会社</label>
            <input type="text" id="managementCompany">
        </div>

        <div class="form-group">
            <label>分割</label>
            <select id="installment">
                <option>なし</option>
                <option>あり</option>
                <option>確認中</option>
            </select>
        </div>

        <div class="form-group">
            <label>仲介手数料</label>
            <input type="number" id="fee">
        </div>

        <div class="form-group">
            <label>AD</label>
            <input type="number" id="ad">
        </div>

        <button onclick="addApplication()">登録する</button>
    </section>

    <section class="card">
        <h2>📋 申し込み一覧</h2>

        <table>
            <thead>
                <tr>
                    <th>担当者</th>
                    <th>申込日</th>
                    <th>物件名</th>
                    <th>顧客名</th>
                    <th>管理会社</th>
                    <th>分割</th>
                    <th>仲介</th>
                    <th>AD</th>
                    <th>合計</th>
                </tr>
            </thead>
            <tbody id="applicationList"></tbody>
        </table>
    </section>

    <section class="card">
        <h2>📊 担当者別売上</h2>
        <div id="staffSummary">
            <p>矢部：¥0</p>
            <p>早坂：¥0</p>
            <p>米山：¥0</p>
            <p>吉田：¥0</p>
        </div>
    </section>

    <section class="card">
        <h2>🎯 達成率</h2>
        <p>店舗目標：¥5,000,000</p>
        <p id="achievement">現在：¥0 / 達成率：0%</p>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
